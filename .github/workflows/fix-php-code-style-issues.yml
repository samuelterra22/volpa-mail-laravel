name: code style

on:
  push:
    branches: [main]

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pint
        uses: aglipanci/laravel-pint-action@latest

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: fix code styling"
