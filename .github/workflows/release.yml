name: Release

# Após o CI passar em main, faz bump automático da versão (SemVer via
# Conventional Commits: feat → minor, fix → patch, BREAKING CHANGE → major),
# cria a tag e publica a GitHub Release. A tag dispara o webhook do Packagist.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump version & GitHub release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # false = só gera tag/release quando há commits que justificam SemVer
          # (feat → minor, fix → patch, BREAKING CHANGE → major). Evita release
          # vazia a cada push sem mudança versionável.
          default_bump: false
          release_branches: main
          fetch_all_tags: true

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          makeLatest: true
